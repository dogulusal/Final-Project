name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend: TypeScript lint + tests
  # ─────────────────────────────────────────────
  backend:
    name: Backend (TS + Tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: news_db_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/news_db_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ADMIN_API_KEY: test-api-key
      LLM_PIPELINE_ENABLED: "false"
      LLM_DAILY_QUOTA: "0"
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript derleme kontrolü
        run: npx tsc --noEmit

      - name: Prisma migrate (test DB)
        run: npx prisma migrate deploy

      - name: Prisma seed (test DB)
        run: npx ts-node prisma/seed.ts
        continue-on-error: true  # Seed yoksa CI durmasın

      - name: Testleri çalıştır
        run: npx jest --no-coverage --forceExit --passWithNoTests

  # ─────────────────────────────────────────────
  # Frontend: TypeScript lint
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (TS Check)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_ADMIN_API_KEY: test-key
      NEXT_PUBLIC_SITE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript derleme kontrolü
        run: npx tsc --noEmit
